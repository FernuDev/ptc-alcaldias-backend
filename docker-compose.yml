services:
  db:
    # PostGIS (REQ-09: clustering espacial ST_ClusterDBSCAN del expediente de zona).
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: ptc
      POSTGRES_PASSWORD: ptc_secret
      POSTGRES_DB: ptc_alcaldias
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptc -d ptc_alcaldias"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://ptc:ptc_secret@db:5432/ptc_alcaldias
      # Sin default inseguro: se interpola desde el .env (o el entorno del host).
      # En APP_ENV != development la app aborta si esta clave falta o es el
      # placeholder. Para desarrollo, config.py usa el placeholder por defecto.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: '["http://localhost:3000"]'
      APP_ENV: development
      PYTHONPATH: /app
      # ── Agente Institucional ──
      # LLM real (DeepSeek): la key se interpola desde el archivo .env.
      # Embeddings 'fake' (los vectores demo ya ingestados son fake); para
      # embeddings reales: EMBEDDING_PROVIDER=local + sentence-transformers + re-ingesta.
      LLM_PROVIDER: deepseek
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDING_PROVIDER: fake
      VECTOR_DB_PATH: /app/data/chroma
      KNOWLEDGE_PATH: /app/data/seed/knowledge
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed.py &&
        python scripts/seed_org.py &&
        python scripts/ingest_knowledge.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - .:/app

volumes:
  pgdata:
